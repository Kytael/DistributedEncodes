<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRACTUM :: ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000; --neon-purple: #cc00ff; --neon-pink: #ff00aa;
            --neon-green: #00ff41; --neon-red: #ff3333; --neon-orange: #ffaa00;
            --text-light: #e0e0e0; --text-dim: #888888; --font: 'Roboto Mono', monospace;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: var(--font); padding: 20px; background-image: linear-gradient(to right, rgba(204,0,255,0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(204,0,255,0.05) 1px, transparent 1px); background-size: 25px 25px; }
        .container { max-width: 1400px; margin: 0 auto; border: 2px solid var(--neon-purple); background: rgba(10, 10, 10, 0.95); padding: 25px; box-shadow: 0 0 15px var(--neon-purple); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--neon-purple); padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        h1 { color: var(--neon-pink); margin: 0; font-size: 1.5em; text-shadow: 0 0 5px var(--neon-pink); }
        .back-link { color: var(--text-dim); text-decoration: none; font-size: 0.8em; }
        .back-link:hover { color: var(--neon-pink); }
        
        .toolbar { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid #333; }
        .toolbar-group { display: flex; align-items: center; gap: 5px; border-right: 1px solid #444; padding-right: 15px; }
        .toolbar-group:last-child { border-right: none; }
        .label { font-size: 0.75em; color: var(--text-dim); margin-right: 5px; text-transform: uppercase; }
        
        button { background: transparent; border: 1px solid var(--text-dim); color: var(--text-dim); padding: 6px 12px; cursor: pointer; font-family: var(--font); font-size: 0.8em; transition: all 0.2s; }
        button:hover { border-color: var(--text-light); color: var(--text-light); }
        
        button.active { font-weight: bold; box-shadow: 0 0 8px currentColor; }
        button.t-failed.active { border-color: var(--neon-red); color: var(--neon-red); background: rgba(255, 51, 51, 0.1); }
        button.t-completed.active { border-color: var(--neon-green); color: var(--neon-green); background: rgba(0, 255, 65, 0.1); }
        button.t-queued.active { border-color: var(--text-light); color: var(--text-light); background: rgba(255, 255, 255, 0.1); }
        button.t-processing.active { border-color: var(--neon-purple); color: var(--neon-purple); background: rgba(204, 0, 255, 0.1); }
        
        button.l-error.active { border-color: var(--neon-red); color: var(--neon-red); background: rgba(255, 51, 51, 0.1); }
        button.l-warn.active { border-color: var(--neon-orange); color: var(--neon-orange); background: rgba(255, 170, 0, 0.1); }
        button.l-info.active { border-color: var(--neon-green); color: var(--neon-green); background: rgba(0, 255, 65, 0.1); }

        input[type="text"] { background: rgba(0,0,0,0.5); border: 1px solid var(--neon-purple); color: var(--text-light); padding: 6px 10px; font-family: var(--font); width: 200px; }
        input[type="text"]:focus { outline: none; box-shadow: 0 0 5px var(--neon-purple); }

        .card { border: 1px solid var(--neon-pink); margin-bottom: 20px; background: rgba(0,0,0,0.2); }
        .card-header { padding: 10px 15px; border-bottom: 1px dashed var(--neon-pink); display: flex; justify-content: space-between; align-items: center; }
        .card-header h3 { margin: 0; color: var(--neon-pink); font-size: 1em; }
        
        .scroll-box { max-height: 500px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; table-layout: fixed; }
        th, td { padding: 8px 10px; text-align: left; border-bottom: 1px dotted #333; }
        th { color: var(--neon-purple); position: sticky; top: 0; background: #0a0a0a; z-index: 2; }
        
        .st-failed { color: var(--neon-red); }
        .st-completed { color: var(--neon-green); }
        .st-processing { color: var(--neon-purple); animation: pulse 1.5s infinite; }
        .st-queued { color: var(--text-dim); }
        @keyframes pulse { 0% { opacity: 0.7; } 100% { opacity: 1; } }
        
        .log-error { color: var(--neon-red); font-weight: bold; }
        .log-warn { color: var(--neon-orange); }
        .log-info { color: var(--neon-green); }
        
        .worker-tag { background: #222; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; cursor: pointer; }
        .worker-tag:hover { background: #444; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <a href="/" class="back-link">&lt;&lt; DASHBOARD</a>
                <h1>// SYSTEM_ADMIN</h1>
            </div>
            <div>
                <button onclick="act('all','retry_all_failed')" style="border-color: var(--neon-red); color: var(--neon-red);">[ RESET FAILED ]</button>
                <button onclick="rescanDB()" style="border-color: var(--neon-green); color: var(--neon-green);">[ SCAN FILES ]</button>
                <button onclick="refreshAll()" style="border-color: var(--neon-purple); color: var(--neon-purple);">[ REFRESH DATA ]</button>
            </div>
        </div>

        <div class="toolbar">
            <div class="label">JOB STATUS:</div>
            <div class="toolbar-group">
                <button class="t-failed active" onclick="toggleJobFilter('failed')" id="jf-failed">FAILED</button>
                <button class="t-processing active" onclick="toggleJobFilter('processing')" id="jf-processing">ACTIVE</button>
                <button class="t-queued" onclick="toggleJobFilter('queued')" id="jf-queued">QUEUED</button>
                <button class="t-completed" onclick="toggleJobFilter('completed')" id="jf-completed">DONE</button>
            </div>
            
            <div class="label">SEARCH:</div>
            <div class="toolbar-group">
                <input type="text" id="searchInput" placeholder="Worker / File / ID..." onkeyup="applyFilters()">
            </div>
        </div>

        <div class="card">
            <div class="card-header"><h3>>> JOB_REGISTRY</h3></div>
            <div class="scroll-box">
                <table>
                    <thead>
                        <tr>
                            <th width="40%">FILE</th>
                            <th width="15%">STATUS</th>
                            <th width="25%">WORKER</th>
                            <th width="20%">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="job-list"></tbody>
                </table>
            </div>
        </div>

        <div class="toolbar" style="margin-top: 30px;">
            <div class="label">LOG LEVEL:</div>
            <div class="toolbar-group">
                <button class="l-error active" onclick="toggleLogFilter('ERROR')" id="lf-ERROR">ERROR</button>
                <button class="l-warn active" onclick="toggleLogFilter('WARN')" id="lf-WARN">WARN</button>
                <button class="l-info" onclick="toggleLogFilter('INFO')" id="lf-INFO">INFO</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><h3>>> SYSTEM_LOGS</h3></div>
            <div class="scroll-box">
                <table>
                    <thead>
                        <tr>
                            <th width="15%">TIME</th>
                            <th width="10%">LEVEL</th>
                            <th width="55%">MESSAGE</th>
                            <th width="20%">JOB ID</th>
                        </tr>
                    </thead>
                    <tbody id="log-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let jobsData = [];
        let logsData = [];
        
        let jobFilters = { failed: true, processing: true, queued: false, completed: false };
        let logFilters = { ERROR: true, CRITICAL: true, WARN: true, INFO: false };

        function escapeHTML(str) {
            if (!str) return "";
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        }

        async function refreshAll() {
            await Promise.all([loadJobs(), loadLogs()]);
            applyFilters();
        }

        async function loadJobs() {
            const r = await fetch('/api/all_jobs');
            const d = await r.json();
            jobsData = d.jobs;
        }

        async function loadLogs() {
            const r = await fetch('/api/logs?limit=500');
            const d = await r.json();
            logsData = d.logs;
        }

        function toggleJobFilter(key) {
            jobFilters[key] = !jobFilters[key];
            document.getElementById(`jf-${key}`).classList.toggle('active');
            applyFilters();
        }

        function toggleLogFilter(key) {
            logFilters[key] = !logFilters[key];
            document.getElementById(`lf-${key}`).classList.toggle('active');
            applyFilters();
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            const tbodyJobs = document.getElementById('job-list');
            const filteredJobs = jobsData.filter(j => {
                let statusMatch = false;
                if (j.status === 'failed' && jobFilters.failed) statusMatch = true;
                if (j.status === 'completed' && jobFilters.completed) statusMatch = true;
                if (j.status === 'queued' && jobFilters.queued) statusMatch = true;
                if (['processing', 'downloading', 'uploading'].includes(j.status) && jobFilters.processing) statusMatch = true;
                if (!statusMatch) return false;

                if (search) {
                    const txt = `${j.id} ${j.worker_id || ''}`.toLowerCase();
                    return txt.includes(search);
                }
                return true;
            });

            if (filteredJobs.length === 0) {
                tbodyJobs.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#555;">// NO DATA MATCHES FILTER //</td></tr>';
            } else {
                tbodyJobs.innerHTML = filteredJobs.map(j => {
                    const cleanName = j.id.split('/').pop();
                    const workerDisplay = j.worker_id ? `<span class="worker-tag" onclick="setSearch('${escapeHTML(j.worker_id)}')">${escapeHTML(j.worker_id)} <small style="color:#666; font-size:0.8em;">(v${escapeHTML(j.worker_version || '?')})</small></span>` : '<span style="color:#444">-</span>';
                    
                    let actions = `<button onclick="act('${escapeHTML(j.id)}','delete')" style="border-color:var(--neon-red); color:var(--neon-red)">DEL</button>`;
                    if (j.status === 'failed' || j.status === 'completed') {
                        actions = `<button onclick="act('${escapeHTML(j.id)}','retry')" style="border-color:var(--neon-green); color:var(--neon-green)">RETRY</button> ` + actions;
                    }

                    return `<tr>
                        <td title="${escapeHTML(j.id)}">${escapeHTML(cleanName)}</td>
                        <td class="st-${j.status}">${j.status.toUpperCase()}</td>
                        <td>${workerDisplay}</td>
                        <td>${actions}</td>
                    </tr>`;
                }).join('');
            }

            const tbodyLogs = document.getElementById('log-list');
            const filteredLogs = logsData.filter(l => {
                if (!logFilters[l.level] && !(l.level === 'CRITICAL' && logFilters.ERROR)) return false;
                if (search) {
                    const txt = `${l.message} ${l.related_id || ''}`.toLowerCase();
                    return txt.includes(search);
                }
                return true;
            });

            if (filteredLogs.length === 0) {
                tbodyLogs.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#555;">// NO LOGS MATCH FILTER //</td></tr>';
            } else {
                tbodyLogs.innerHTML = filteredLogs.map(l => {
                    let cssClass = "";
                    if (l.level === 'ERROR' || l.level === 'CRITICAL') cssClass = "log-error";
                    else if (l.level === 'WARN') cssClass = "log-warn";
                    else cssClass = "log-info";

                    return `<tr>
                        <td style="color:#666">${l.timestamp.split(' ')[1]}</td>
                        <td class="${cssClass}">${l.level}</td>
                        <td style="word-break: break-all;">${escapeHTML(l.message)}</td>
                        <td style="font-size:0.8em; color:#888;">${escapeHTML(l.related_id || '')}</td>
                    </tr>`;
                }).join('');
            }
        }

        function setSearch(val) {
            document.getElementById('searchInput').value = val;
            applyFilters();
        }

        function act(id, action) {
            let msg = `${action.toUpperCase()} job?`;
            if (action === 'retry_all_failed') msg = "WARNING: This will reset ALL failed jobs. Confirm?";
            
            if(!confirm(msg)) return;
            fetch('/api/admin_action', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({job_id:id, action:action})
            }).then(() => { refreshAll(); });
        }

        function rescanDB() {
            if(!confirm("Rescan all files?")) return;
            fetch('/api/rescan_db').then(() => { alert("Scan initiated"); refreshAll(); });
        }

        window.onload = refreshAll;
        setInterval(refreshAll, 10000);
    </script>
</body>
</html>
