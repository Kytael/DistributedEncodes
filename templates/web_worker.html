<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Emscripten Worker</title>
    <style>
        body { font-family: monospace; background: #111; color: #ccc; padding: 20px; max-width: 900px; margin: 0 auto; }
        .card { background: #222; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        h1 { color: #fff; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .log-box { 
            background: #000; color: #0f0; border: 1px solid #444; 
            height: 400px; overflow-y: scroll; padding: 10px; white-space: pre-wrap; font-size: 12px; 
        }
        button { 
            padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; font-family: monospace;
        }
        .btn-start { background: #007bff; color: white; }
        .btn-start:hover { background: #0056b3; }
        .btn-stop { background: #dc3545; color: white; display: none; }
        input { background: #333; border: 1px solid #555; color: white; padding: 5px; font-family: monospace; }
    </style>

    <script>
        // --- 1. CONFIGURE RAW EMSCRIPTEN MODULE ---
        var isFFmpegReady = false;

        var Module = {
            // Redirect stdout/stderr to our HTML log
            print: function(text) { log("STDOUT: " + text); },
            printErr: function(text) { log("STDERR: " + text); },
            
            // Callback when WASM is compiled and memory is ready
            onRuntimeInitialized: function() {
                isFFmpegReady = true;
                log("✅ SYSTEM: FFmpeg WASM Runtime Initialized.");
                log("ℹ️  NOTE: Encoding runs on the main thread. Browser may freeze during 'callMain'.");
            }
        };

        // UI Logger
        function log(msg) {
            const box = document.getElementById('log');
            if (box) {
                const time = new Date().toLocaleTimeString();
                box.innerHTML += `[${time}] ${msg}\n`;
                box.scrollTop = box.scrollHeight;
            }
            console.log(msg);
        }
    </script>

    <script src="/static/ffmpeg.js"></script>
</head>
<body>

    <h1>🛠️ Custom Raw FFmpeg Worker</h1>

    <div class="card">
        <label>Worker Name: <input type="text" id="workerName" value="RawWasmNode"></label>
        <br><br>
        <button id="btnStart" class="btn-start" onclick="startLoop()">Start Processing</button>
        <button id="btnStop" class="btn-stop" onclick="stopLoop()">Stop</button>
    </div>

    <div class="card">
        <div id="log" class="log-box">Waiting for Module to initialize...</div>
    </div>

<script>
    let isRunning = false;

    async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function toggleButtons(active) {
        document.getElementById('btnStart').style.display = active ? 'none' : 'inline-block';
        document.getElementById('btnStop').style.display = active ? 'inline-block' : 'none';
    }

    function stopLoop() {
        isRunning = false;
        log("🛑 STOP command received. Finishing current job...");
    }

    async function startLoop() {
        if (!isFFmpegReady) {
            alert("FFmpeg is not ready yet. Please wait for the WASM to load.");
            return;
        }

        isRunning = true;
        toggleButtons(true);
        const workerName = document.getElementById('workerName').value;

        while (isRunning) {
            try {
                // A. GET JOB
                log("🔄 Checking for jobs...");
                const res = await fetch('/get_job');
                const data = await res.json();

                if (data.status === 'empty') {
                    log("💤 Queue empty. Waiting 10s...");
                    await sleep(10000);
                    continue;
                }

                if (data.status === 'ok') {
                    await processJob(data.job, workerName);
                }

            } catch (e) {
                log("❌ ERROR: " + e.message);
                await sleep(5000);
            }
        }

        toggleButtons(false);
        log("⏹️ Worker Stopped.");
    }

    async function processJob(job, workerName) {
        const jobId = job.id;
        log(`🎬 STARTING JOB: ${job.filename} (${jobId})`);
        
        const inputName = "input_" + Date.now(); // Simple names for WASM FS
        const outputName = "output.mp4";

        try {
            // B. DOWNLOAD
            log("⬇️ Downloading source...");
            const dl = await fetch(job.download_url);
            const buf = await dl.arrayBuffer();
            const data = new Uint8Array(buf);
            
            // C. WRITE TO VIRTUAL FS
            log(`💾 Writing ${data.length} bytes to Virtual FS: ${inputName}`);
            Module.FS.writeFile(inputName, data);

            // D. EXECUTE (Synchronous callMain)
            log("⚙️  EXECUTE: callMain(). Browser will FREEZE now...");
            
            // Use setTimeout to allow the DOM to update the "Freeze" warning before we block the thread
            await new Promise(resolve => setTimeout(() => {
                const startTime = Date.now();
                
                try {
                    // *** RAW EMSCRIPTEN API CALL ***
                    // Equivalent to: ffmpeg -i input -c:v libsvtav1 ... output.mp4
                    Module.callMain([
                        '-i', inputName,
                        '-c:v', 'libsvtav1',
                        '-preset', '8',
                        '-crf', '35',
                        '-g', '240',
                        '-pix_fmt', 'yuv420p10le', 
                        '-svtav1-params', 'tune=0',
                        '-c:a', 'libopus',
                        '-b:a', '128k',
                        '-ac', '1',
                        outputName
                    ]);
                } catch (err) {
                    log("❌ FFmpeg Crashed: " + err);
                    throw err;
                }

                const duration = (Date.now() - startTime) / 1000;
                log(`✅ Transcoding Finished in ${duration.toFixed(1)}s`);
                resolve(duration);
            }, 50)); // Small delay to render UI

            // E. READ OUTPUT
            log("📂 Reading output file...");
            const outData = Module.FS.readFile(outputName);
            const blob = new Blob([outData], { type: 'video/mp4' });

            // F. UPLOAD
            log(`⬆️  Uploading ${outData.length} bytes...`);
            const formData = new FormData();
            formData.append('job_id', jobId);
            formData.append('worker_id', workerName + " (RawWASM)");
            formData.append('file', blob, 'result.mp4');
            // We can't easily track duration in sync mode unless we diff Date.now(), which we did above
            // formData.append('duration', duration); 

            const up = await fetch('/upload_result', { method: 'POST', body: formData });
            
            if (up.ok) log("🎉 Upload Success!");
            else log("⚠️ Upload Failed: " + up.statusText);

        } catch (e) {
            log("❌ JOB FAILED: " + e);
        } finally {
            // G. CLEANUP FS
            try {
                if (Module.FS.analyzePath(inputName).exists) Module.FS.unlink(inputName);
                if (Module.FS.analyzePath(outputName).exists) Module.FS.unlink(outputName);
                log("🧹 Cleanup done.");
            } catch(e) { console.error(e); }
        }
    }
</script>

</body>
</html>
