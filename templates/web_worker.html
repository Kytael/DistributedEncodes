<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRACTUM :: WEB NODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --bg-panel: #0a0a0a;
            --neon-purple: #cc00ff;
            --neon-pink: #ff00aa;
            --neon-green: #00ff41;
            --neon-red: #ff3333;
            --text-light: #e0e0e0;
            --text-dim: #888888;
            --font: 'Roboto Mono', monospace;
        }
        *, *::before, *::after { box-sizing: border-box; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font);
            padding: 20px;
            margin: 0;
            background-image: 
                linear-gradient(to right, rgba(204,0,255,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(204,0,255,0.05) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        .dashboard-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            border: 2px solid var(--neon-purple);
            background-color: rgba(10, 10, 10, 0.9);
            box-shadow: 0 0 15px var(--neon-purple), inset 0 0 10px rgba(204,0,255,0.2);
            padding: 25px;
            border-radius: 5px;
        }

        /* Header */
        .header-container { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            border-bottom: 1px dashed var(--neon-purple);
            padding-bottom: 15px; 
        }
        .header-title-group { display: flex; flex-direction: column; }
        .back-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8em;
            margin-bottom: 5px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--neon-pink); text-shadow: 0 0 5px var(--neon-pink); }
        
        h1 { 
            color: var(--neon-green); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            text-shadow: 0 0 8px var(--neon-green); 
            margin: 0; 
            font-size: 1.8em;
        }

        /* Card & Controls */
        .card { 
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--neon-purple); 
            padding: 20px; 
            box-shadow: 0 0 8px rgba(204,0,255,0.2);
            margin-bottom: 25px;
        }
        .card-header {
            border-bottom: 1px dashed var(--neon-purple);
            padding-bottom: 10px;
            margin-bottom: 15px;
            color: var(--neon-purple);
            font-weight: bold;
            font-size: 1.1em;
            text-transform: uppercase;
        }

        /* Inputs & Buttons */
        label { color: var(--text-dim); margin-right: 10px; }
        input[type="text"] {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-purple);
            color: var(--text-light);
            padding: 8px 12px;
            font-family: var(--font);
            width: 350px;
            font-size: 1em;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
        }

        .btn-control {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px 25px;
            font-family: var(--font);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            margin-right: 10px;
            font-size: 1em;
            box-shadow: 0 0 5px var(--neon-green);
        }
        .btn-control:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 20px var(--neon-green);
        }
        .btn-stop {
            border-color: var(--neon-red);
            color: var(--neon-red);
            box-shadow: 0 0 5px var(--neon-red);
            display: none; /* Hidden by default */
        }
        .btn-stop:hover {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 20px var(--neon-red);
        }

        /* Log Box */
        .log-box {
            background: #000; 
            color: var(--text-light); 
            border: 1px solid var(--text-dim); 
            height: 400px; 
            overflow-y: scroll; 
            padding: 15px; 
            white-space: pre-wrap; 
            font-size: 12px; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.9);
            font-family: 'Consolas', 'Monaco', monospace;
        }
        .log-time { color: var(--text-dim); }
        .log-sys { color: var(--neon-purple); }
        .log-err { color: var(--neon-red); }
        .log-succ { color: var(--neon-green); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border: 1px solid #555; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-purple); }
    </style>

    <script>
        function log(msg, type='normal') {
            const box = document.getElementById('log');
            if (box) {
                const time = new Date().toLocaleTimeString();
                let colorClass = '';
                if(type === 'sys') colorClass = 'log-sys';
                if(type === 'err') colorClass = 'log-err';
                if(type === 'succ') colorClass = 'log-succ';
                
                const span = `<span class="log-time">[${time}]</span> <span class="${colorClass}">${msg}</span>`;
                box.innerHTML += span + "\n";
                box.scrollTop = box.scrollHeight;
            }
            console.log(msg);
        }
    </script>
</head>
<body>

    <div class="dashboard-container">
        <div class="header-container">
            <div class="header-title-group">
                <a href="/dashboard" class="back-link">&lt;&lt; BACK TO DASHBOARD</a>
                <h1>// BROWSER_NODE_CONTROLLER</h1>
            </div>
        </div>

        <div class="card">
            <div class="card-header">>> CONFIGURATION</div>
            <div style="margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap;">
                <div>
                    <label>USERNAME:</label>
                    <input type="text" id="username" value="Anonymous" style="width: 200px;">
                </div>
                <div>
                    <label>WORKER_NAME:</label>
                    <input type="text" id="workerName" value="WebNode" style="width: 200px;">
                </div>
            </div>
            <div>
                <button id="btnStart" class="btn-control" onclick="startLoop()">[ EXECUTE ]</button>
                <button id="btnStop" class="btn-control btn-stop" onclick="stopLoop()">[ TERMINATE ]</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">>> CONSOLE_OUTPUT</div>
            <div id="log" class="log-box">System Ready.</div>
        </div>
    </div>

<script>
    let isRunning = false;
    let worker = null;
    let currentWorkerId = "";
    
    // Track if worker is ready (module initialized)
    let isWorkerReady = false; 

    async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function toggleButtons(active) {
        document.getElementById('btnStart').style.display = active ? 'none' : 'inline-block';
        document.getElementById('btnStop').style.display = active ? 'inline-block' : 'none';
        document.getElementById('username').disabled = active;
        document.getElementById('workerName').disabled = active;
    }

    function stopLoop() {
        isRunning = false;
        log("STOP command received. Finishing current job...", 'err');
        if (worker) {
            worker.terminate();
            worker = null;
            log("Worker terminated immediately.", 'err');
            toggleButtons(false);
        }
    }

    async function initWorker() {
        if (worker) worker.terminate();
        
        log("Initializing Web Worker...", 'sys');
        // Add cache busting
        worker = new Worker('/static/web_node.js?v=' + Date.now() + '&r=blobextend');
        isWorkerReady = false;

        return new Promise((resolve, reject) => {
            worker.onmessage = (e) => {
                const msg = e.data;
                if (msg.type === 'log') {
                    log(msg.msg, msg.level);
                } else if (msg.type === 'ready') {
                    isWorkerReady = true;
                    log("Worker (FFmpeg WASM) Initialized.", 'succ');
                    resolve();
                } else if (msg.type === 'error') {
                    // Initialization error
                    if (!isWorkerReady) reject(msg.msg);
                }
            };
            worker.onerror = (e) => {
                log("Worker Error: " + (e.message || e), 'err');
                reject(e);
            };
        });
    }

    async function startLoop() {
        const user = document.getElementById('username').value.trim() || "Anonymous";
        const node = document.getElementById('workerName').value.trim() || "WebNode";
        const runId = Math.floor(Date.now() / 1000); 
        currentWorkerId = `${user}-${node}-${runId}-1`;

        try {
            await initWorker();
        } catch (e) {
            log("Failed to initialize worker: " + e, 'err');
            return;
        }

        isRunning = true;
        toggleButtons(true);
        
        log(`Worker [${currentWorkerId}] Started. Polling for jobs...`, 'succ');

        while (isRunning) {
            try {
                // A. GET JOB
                // Request max 256MB initially to be safe? 
                // The worker has 1GB heap, but overhead matters. 
                // Let's try 512MB again, hoping separate thread helps.
                const res = await fetch('/get_job?max_size_mb=512');
                const data = await res.json();

                if (data.status === 'empty') {
                    await sleep(10000);
                    continue;
                }

                if (data.status === 'ok') {
                    const job = data.job;
                    job.worker_id = currentWorkerId;
                    
                    log(`STARTING JOB: ${job.filename} (${job.id})`, 'sys');

                    // Run in worker and wait
                    await runJobInWorker(job);
                    log("Job Cycle Complete.", 'succ');
                    
                    // Optional: Restart worker every few jobs to clear fragmentation?
                    // For now, let's keep it running unless it crashes.
                }

            } catch (e) {
                log("LOOP ERROR: " + e.message, 'err');
                // If the error implies worker crash, restart it
                if (worker === null) { 
                    log("Worker seems dead. Restarting...", 'err');
                    try { await initWorker(); } catch(err) { isRunning = false; }
                }
                await sleep(5000);
            }
        }

        toggleButtons(false);
        log("Worker Stopped.", 'err');
    }

    function runJobInWorker(job) {
        return new Promise((resolve, reject) => {
            if (!worker) {
                reject(new Error("Worker not initialized"));
                return;
            }

            // Define temporary handler for this job
            const originalOnMsg = worker.onmessage;
            
            worker.onmessage = (e) => {
                const msg = e.data;
                if (msg.type === 'log') {
                    log(msg.msg, msg.level);
                } else if (msg.type === 'done') {
                    // Restore original handler (for logs/ready) or just keep it?
                    // Re-init handles logging generally.
                    resolve();
                } else if (msg.type === 'error') {
                    reject(new Error(msg.msg));
                }
            };
            
            // If worker crashes/terminates during job
            worker.onerror = (e) => {
                reject(new Error("Worker Crashed: " + e.message));
                worker = null; // Mark as dead
            };

            worker.postMessage({type: 'run_job', job: job});
        });
    }
</script>

</body>
</html>
