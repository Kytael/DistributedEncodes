<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRACTUM :: WEB NODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --bg-panel: #0a0a0a;
            --neon-purple: #cc00ff;
            --neon-pink: #ff00aa;
            --neon-green: #00ff41;
            --neon-red: #ff3333;
            --text-light: #e0e0e0;
            --text-dim: #888888;
            --font: 'Roboto Mono', monospace;
        }
        *, *::before, *::after { box-sizing: border-box; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font);
            padding: 20px;
            margin: 0;
            background-image: 
                linear-gradient(to right, rgba(204,0,255,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(204,0,255,0.05) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        .dashboard-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            border: 2px solid var(--neon-purple);
            background-color: rgba(10, 10, 10, 0.9);
            box-shadow: 0 0 15px var(--neon-purple), inset 0 0 10px rgba(204,0,255,0.2);
            padding: 25px;
            border-radius: 5px;
        }

        /* Header */
        .header-container { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            border-bottom: 1px dashed var(--neon-purple);
            padding-bottom: 15px; 
        }
        .header-title-group { display: flex; flex-direction: column; }
        .back-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8em;
            margin-bottom: 5px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--neon-pink); text-shadow: 0 0 5px var(--neon-pink); }
        
        h1 { 
            color: var(--neon-green); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            text-shadow: 0 0 8px var(--neon-green); 
            margin: 0; 
            font-size: 1.8em;
        }

        /* Card & Controls */
        .card { 
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--neon-purple); 
            padding: 20px; 
            box-shadow: 0 0 8px rgba(204,0,255,0.2);
            margin-bottom: 25px;
        }
        .card-header {
            border-bottom: 1px dashed var(--neon-purple);
            padding-bottom: 10px;
            margin-bottom: 15px;
            color: var(--neon-purple);
            font-weight: bold;
            font-size: 1.1em;
            text-transform: uppercase;
        }

        /* Inputs & Buttons */
        label { color: var(--text-dim); margin-right: 10px; }
        input[type="text"] {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-purple);
            color: var(--text-light);
            padding: 8px 12px;
            font-family: var(--font);
            width: 350px;
            font-size: 1em;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
        }

        .btn-control {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px 25px;
            font-family: var(--font);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            margin-right: 10px;
            font-size: 1em;
            box-shadow: 0 0 5px var(--neon-green);
        }
        .btn-control:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 20px var(--neon-green);
        }
        .btn-stop {
            border-color: var(--neon-red);
            color: var(--neon-red);
            box-shadow: 0 0 5px var(--neon-red);
            display: none; /* Hidden by default */
        }
        .btn-stop:hover {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 20px var(--neon-red);
        }

        /* Log Box */
        .log-box {
            background: #000; 
            color: var(--text-light); 
            border: 1px solid var(--text-dim); 
            height: 400px; 
            overflow-y: scroll; 
            padding: 15px; 
            white-space: pre-wrap; 
            font-size: 12px; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.9);
            font-family: 'Consolas', 'Monaco', monospace;
        }
        .log-time { color: var(--text-dim); }
        .log-sys { color: var(--neon-purple); }
        .log-err { color: var(--neon-red); }
        .log-succ { color: var(--neon-green); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border: 1px solid #555; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-purple); }
    </style>

    <script>
        var isFFmpegReady = false;

        var Module = {
            print: function(text) { log("STDOUT: " + text, 'sys'); },
            printErr: function(text) { log("STDERR: " + text, 'err'); },
            onRuntimeInitialized: function() {
                isFFmpegReady = true;
                log("SYSTEM: FFmpeg WASM Runtime Initialized.", 'succ');
                log("NOTE: Encoding runs on the main thread. Browser may freeze during 'callMain'.", 'sys');
            }
        };

        function log(msg, type='normal') {
            const box = document.getElementById('log');
            if (box) {
                const time = new Date().toLocaleTimeString();
                let colorClass = '';
                if(type === 'sys') colorClass = 'log-sys';
                if(type === 'err') colorClass = 'log-err';
                if(type === 'succ') colorClass = 'log-succ';
                
                const span = `<span class="log-time">[${time}]</span> <span class="${colorClass}">${msg}</span>`;
                box.innerHTML += span + "\n";
                box.scrollTop = box.scrollHeight;
            }
            console.log(msg);
        }
    </script>
    <script src="/static/ffmpeg.js"></script>
</head>
<body>

    <div class="dashboard-container">
        <div class="header-container">
            <div class="header-title-group">
                <a href="/dashboard" class="back-link">&lt;&lt; BACK TO DASHBOARD</a>
                <h1>// BROWSER_NODE_CONTROLLER</h1>
            </div>
        </div>

        <div class="card">
            <div class="card-header">>> CONFIGURATION</div>
            <div style="margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap;">
                <div>
                    <label>USERNAME:</label>
                    <input type="text" id="username" value="Anonymous" style="width: 200px;">
                </div>
                <div>
                    <label>WORKER_NAME:</label>
                    <input type="text" id="workerName" value="WebNode" style="width: 200px;">
                </div>
            </div>
            <div>
                <button id="btnStart" class="btn-control" onclick="startLoop()">[ EXECUTE ]</button>
                <button id="btnStop" class="btn-control btn-stop" onclick="stopLoop()">[ TERMINATE ]</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">>> CONSOLE_OUTPUT</div>
            <div id="log" class="log-box">Initializing WASM Core...</div>
        </div>
    </div>

<script>
    // Set default name logic if needed, but we hardcoded defaults in HTML for simplicity
    document.addEventListener("DOMContentLoaded", () => {
        // Optional: Pre-fill specific logic if required
    });

    let isRunning = false;

    async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function toggleButtons(active) {
        document.getElementById('btnStart').style.display = active ? 'none' : 'inline-block';
        document.getElementById('btnStop').style.display = active ? 'inline-block' : 'none';
        document.getElementById('username').disabled = active;
        document.getElementById('workerName').disabled = active;
    }

    function stopLoop() {
        isRunning = false;
        log("STOP command received. Finishing current job...", 'err');
    }

    async function startLoop() {
        if (!isFFmpegReady) {
            alert("FFmpeg is not ready yet. Please wait for the WASM to load.");
            return;
        }

        const user = document.getElementById('username').value.trim() || "Anonymous";
        const node = document.getElementById('workerName').value.trim() || "WebNode";
        // Format: Username-WorkerName-Timestamp-ThreadID
        // We use a fixed timestamp per session start to identify this specific run instance
        const runId = Math.floor(Date.now() / 1000); 
        const fullWorkerId = `${user}-${node}-${runId}-1`;

        isRunning = true;
        toggleButtons(true);
        
        log(`Worker [${fullWorkerId}] Started. Polling for jobs...`, 'succ');

        while (isRunning) {
            try {
                // A. GET JOB
                // Request max 1GB job for web node stability
                const res = await fetch('/get_job?max_size_mb=1024');
                const data = await res.json();

                if (data.status === 'empty') {
                    // log("Queue empty. Waiting 10s...", 'sys'); // verbose
                    await sleep(10000);
                    continue;
                }

                if (data.status === 'ok') {
                    await processJob(data.job, fullWorkerId);
                }

            } catch (e) {
                log("ERROR: " + e.message, 'err');
                await sleep(5000);
            }
        }

        toggleButtons(false);
        log("Worker Stopped.", 'err');
    }

    async function processJob(job, workerName) {
        const jobId = job.id;
        log(`STARTING JOB: ${job.filename} (${jobId})`, 'sys');
        
        const inputName = "input_" + Date.now(); 
        const outputName = "output.mp4";

        try {
            // B. DOWNLOAD
            log("Downloading source...", 'sys');
            const dl = await fetch(job.download_url);
            
            // [SAFETY] Check file size before loading into RAM
            const contentLength = dl.headers.get('content-length');
            if (contentLength) {
                const sizeMB = parseInt(contentLength) / (1024 * 1024);
                if (sizeMB > 1024) { // 1GB Limit
                    throw new Error(`File too large for Web Node (${sizeMB.toFixed(2)} MB). Limit is 1GB.`);
                }
            }

            const buf = await dl.arrayBuffer();
            let data = new Uint8Array(buf);
            
            // C. WRITE TO VIRTUAL FS
            if (!Module.FS) throw new Error("FFmpeg FileSystem (FS) not initialized. WASM may have failed to load.");
            
            log(`Writing ${data.length} bytes to Virtual FS: ${inputName}`, 'sys');
            Module.FS.writeFile(inputName, data);

            // [MEMORY] Free JS memory immediately
            data = null; 
            // Note: 'buf' is const but we lose reference to the wrapper 'data'. 
            // To be thorough, we can't null 'buf' if it's const, so we rely on 'data = null' and scope exit.

            // D. EXECUTE (Synchronous callMain)
            log("EXECUTE: callMain(). Browser will FREEZE now...", 'err');
            
            // Use setTimeout to allow the DOM to update the "Freeze" warning before we block the thread
            await new Promise(resolve => setTimeout(() => {
                const startTime = Date.now();
                
                try {
                    Module.callMain([
                        '-i', inputName,
                        '-c:v', 'libsvtav1',
                        '-preset', '8',
                        '-crf', '35',
                        '-g', '240',
                        '-pix_fmt', 'yuv420p10le', 
                        '-svtav1-params', 'tune=0',
                        '-c:a', 'libopus',
                        '-b:a', '128k',
                        '-ac', '1',
                        outputName
                    ]);
                } catch (err) {
                    log("FFmpeg Crashed: " + err, 'err');
                    throw err;
                }

                const duration = (Date.now() - startTime) / 1000;
                log(`Transcoding Finished in ${duration.toFixed(1)}s`, 'succ');
                resolve(duration);
            }, 50)); 

            // E. READ OUTPUT
            log("Reading output file...", 'sys');
            const outData = Module.FS.readFile(outputName);
            const blob = new Blob([outData], { type: 'video/mp4' });

            // F. UPLOAD
            log(`Uploading ${outData.length} bytes...`, 'sys');
            const formData = new FormData();
            formData.append('job_id', jobId);
            formData.append('worker_id', workerName);
            formData.append('file', blob, 'result.mp4');

            const up = await fetch('/upload_result', { method: 'POST', body: formData });
            
            if (up.ok) log("Upload Success!", 'succ');
            else log("Upload Failed: " + up.statusText, 'err');

        } catch (e) {
            log("JOB FAILED: " + e, 'err');
        } finally {
            // G. CLEANUP FS
            try {
                if (Module.FS.analyzePath(inputName).exists) Module.FS.unlink(inputName);
                if (Module.FS.analyzePath(outputName).exists) Module.FS.unlink(outputName);
                log("Cleanup done.", 'sys');
            } catch(e) { console.error(e); }
        }
    }
</script>

</body>
</html>
