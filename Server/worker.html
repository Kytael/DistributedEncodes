<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRACTUM :: WEB NODE</title>
    
    <script src="ffmpeg.js"></script>
    <script src="util.js"></script>

    <style>
        :root {
            --bg-dark: #000000;
            --neon-purple: #cc00ff;
            --neon-pink: #ff00aa;
            --neon-red: #ff0055;
            --text-light: #e0e0e0;
            --font: 'Courier New', monospace;
        }
        body { 
            background: var(--bg-dark); 
            color: var(--text-light); 
            font-family: var(--font); 
            padding: 20px; 
            text-align: center; 
            margin: 0;
            background-image: 
                linear-gradient(to right, rgba(204,0,255,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(204,0,255,0.05) 1px, transparent 1px);
            background-size: 25px 25px;
        }
        h1 { text-shadow: 0 0 10px var(--neon-purple); margin-bottom: 5px;}
        .container { max-width: 800px; margin: 0 auto; }
        
        #log { 
            border: 1px solid var(--neon-purple); 
            height: 300px; 
            overflow-y: scroll; 
            padding: 10px; 
            background: rgba(10,10,10,0.8); 
            color: #0f0; 
            margin-top: 20px; 
            text-align: left;
            font-size: 0.9em;
            box-shadow: inset 0 0 10px rgba(204,0,255,0.2);
        }
        
        .input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-purple);
            color: var(--neon-pink);
            padding: 10px;
            font-family: var(--font);
            font-size: 1.1em;
            width: 250px;
            text-align: center;
            outline: none;
            box-shadow: 0 0 5px var(--neon-purple);
        }
        input[type="text"]:focus {
            border-color: var(--neon-pink);
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button { 
            background: transparent; 
            border: 2px solid var(--neon-purple); 
            color: var(--neon-purple); 
            padding: 15px 40px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1.2em; 
            transition: all 0.2s;
            box-shadow: 0 0 10px var(--neon-purple);
        }
        button:hover { background: var(--neon-purple); color: black; }
        button:disabled { 
            border-color: #555; color: #555; background: transparent; 
            cursor: not-allowed; box-shadow: none; 
        }

        #stopBtn {
            border-color: var(--neon-red);
            color: var(--neon-red);
            box-shadow: 0 0 10px var(--neon-red);
        }
        #stopBtn:hover {
            background: var(--neon-red);
            color: white;
        }
        #stopBtn:disabled {
            border-color: #333;
            color: #333;
            background: transparent;
            box-shadow: none;
        }
        
        .status-bar { border: 1px solid var(--neon-purple); height: 25px; margin-top: 10px; width: 100%; position: relative; background: #111;}
        .fill { background: var(--neon-purple); height: 100%; width: 0%; transition: width 0.2s; box-shadow: 0 0 10px var(--neon-purple); }
    </style>
</head>
<body>
    <div class="container">
        <h1>>> FRACTUM_WEB_NODE</h1>
        <p>STATUS: <span id="status" style="color:var(--neon-pink)">IDLE</span></p>
        
        <div class="input-group">
            <input type="text" id="usernameInput" placeholder="USERNAME (Required)">
            <input type="text" id="workerInput" placeholder="WORKER NAME (Optional)">
        </div>
        
        <div class="btn-container">
            <button id="startBtn" onclick="startWorker()">INITIALIZE NODE</button>
            <button id="stopBtn" onclick="stopWorker()" disabled>STOP</button>
        </div>
        
        <div class="status-bar"><div class="fill" id="progress"></div></div>
        <div id="log"></div>
    </div>

    <script>
        const API_BASE = "https://vsvstats.fractumseraph.net";
        let DISPLAY_NAME = "";
        
        const { FFmpeg } = FFmpegWASM;
        const { fetchFile } = FFmpegUtil;

        window.fractumState = {
            running: false,
            ffmpeg: null,
            currentJobId: null
        };

        // [NEW] Parse URL Parameters on Load
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const urlUser = params.get('username');
            const urlWorker = params.get('worker');
            const autoStart = params.get('autostart');

            if (urlUser) {
                document.getElementById('usernameInput').value = urlUser;
            }
            if (urlWorker) {
                document.getElementById('workerInput').value = urlWorker;
            }

            // Optional: Auto-start if requested and username exists
            if (autoStart === 'true' && urlUser) {
                setTimeout(startWorker, 1000);
            }
        };

        function log(msg) {
            const box = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const text = (typeof msg === 'object') ? JSON.stringify(msg) : msg;
            box.innerHTML += `<div>[${time}] ${text}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function loadFFmpeg() {
            if (!window.fractumState.ffmpeg) {
                log(":: SYSTEM :: Loading FFmpeg Core...");
                window.fractumState.ffmpeg = new FFmpeg();
                
                window.fractumState.ffmpeg.on('log', ({ message }) => {
                    if(message.includes("time=")) {
                        log(message);
                        document.getElementById('progress').style.width = "50%"; 
                    }
                });

                await window.fractumState.ffmpeg.load({
                    coreURL: "./ffmpeg-core.js",
                    wasmURL: "./ffmpeg-core.wasm"
                });
                log(":: SYSTEM :: FFmpeg Ready.");
            }
        }

        async function startWorker() {
            try {
                const user = document.getElementById('usernameInput').value.trim();
                const worker = document.getElementById('workerInput').value.trim();
                
                if (!user) {
                    alert("Username is required!");
                    return;
                }

                DISPLAY_NAME = user + (worker ? ` [${worker}]` : " [WebNode]");

                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('usernameInput').disabled = true;
                document.getElementById('workerInput').disabled = true;
                
                window.fractumState.running = true;
                await loadFFmpeg();
                
                log(`:: NETWORK :: Connected as ${DISPLAY_NAME}`);
                workLoop();
            } catch (e) {
                handleError(e);
            }
        }

        async function stopWorker() {
            log("[!] STOP REQUESTED. Gracefully exiting...");
            window.fractumState.running = false;
            document.getElementById('stopBtn').disabled = true;

            if (window.fractumState.currentJobId) {
                log(`[!] Aborting Job #${window.fractumState.currentJobId}...`);
                try {
                    await fetch(`${API_BASE}/fail_job`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json', 'X-Auth-Token': 'FractumSecure2025'},
                        body: JSON.stringify({ id: window.fractumState.currentJobId })
                    });
                    log(":: SERVER :: Job marked as failed/reset.");
                } catch(e) { console.error(e); }

                try {
                    if (window.fractumState.ffmpeg) {
                        window.fractumState.ffmpeg.terminate();
                        window.fractumState.ffmpeg = null; 
                        log(":: SYSTEM :: FFmpeg process terminated.");
                    }
                } catch(e) { console.error(e); }
                
                window.fractumState.currentJobId = null;
            }
            resetUI();
        }

        function resetUI() {
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('usernameInput').disabled = false;
            document.getElementById('workerInput').disabled = false;
            document.getElementById('status').innerText = "IDLE";
            document.getElementById('progress').style.width = "0%";
            log(":: SYSTEM :: Worker Stopped.");
        }

        function handleError(e) {
            console.error(e);
            const errString = e.message || e.toString() || "Unknown Error";
            log("[CRITICAL] Error: " + errString);
            if(errString.includes("SharedArrayBuffer")) {
                log("---------------------------------------------------");
                log("[!] HEADER ERROR DETECTED");
                log("Your web server is missing headers: COOP and COEP.");
                log("---------------------------------------------------");
            }
            stopWorker();
        }

        async function workLoop() {
            while(window.fractumState.running) {
                try {
                    document.getElementById('status').innerText = "POLLING QUEUE...";
                    const resp = await fetch(`${API_BASE}/get_job`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json', 'X-Auth-Token': 'FractumSecure2025'},
                        body: JSON.stringify({ username: DISPLAY_NAME })
                    });
                    
                    if (!resp.ok) throw new Error(`API Error: ${resp.status}`);
                    const job = await resp.json();

                    if(job.status === 'found') {
                        window.fractumState.currentJobId = job.id;
                        await processJob(job);
                        window.fractumState.currentJobId = null;
                    } else {
                        for(let i=0; i<5; i++) {
                            if(!window.fractumState.running) break;
                            await new Promise(r => setTimeout(r, 1000));
                        }
                    }
                } catch (e) {
                    log("[!] Network Error: " + (e.message || e));
                    await new Promise(r => setTimeout(r, 10000));
                }
            }
        }

        async function processJob(job) {
            if (!window.fractumState.running) return;

            const inputName = "input.mp4";
            const outputName = `web_${job.id}.mp4`;
            const ffmpeg = window.fractumState.ffmpeg;
            
            try {
                log(`>> JOB FOUND #${job.id}: ${job.filename}`);
                document.getElementById('status').innerText = "DOWNLOADING...";
                document.getElementById('progress').style.width = "10%";
                
                const fileResp = await fetch(`${API_BASE}/bridge/download/${job.filename}`);
                if(!fileResp.ok) throw new Error("Bridge download failed");
                const fileData = await fileResp.arrayBuffer();
                
                if (!window.fractumState.running) throw new Error("Stopped by User");
                await ffmpeg.writeFile(inputName, new Uint8Array(fileData));
                
                document.getElementById('status').innerText = "ENCODING...";
                document.getElementById('progress').style.width = "30%";
                log(":: ENCODE :: Starting (AV1 Preset 2 / 480p)...");
                
                await ffmpeg.exec([
                    '-i', inputName,
                    '-vf', 'scale=-2:480', 
                    '-c:v', 'libsvtav1', '-preset', '2', '-crf', '35',
                    '-c:a', 'libopus', '-b:a', '96k', '-ac', '2',
                    outputName
                ]);

                if (!window.fractumState.running) throw new Error("Stopped by User");

                log(":: ENCODE :: Finished. Reading output...");
                document.getElementById('status').innerText = "UPLOADING...";
                document.getElementById('progress').style.width = "80%";
                
                const data = await ffmpeg.readFile(outputName);
                const cleanName = job.filename.replace(/\.[^/.]+$/, "") + "_web.mp4";

                const upResp = await fetch(`${API_BASE}/bridge/upload/${cleanName}`, {
                    method: 'POST',
                    headers: {'X-Auth-Token': 'FractumSecure2025'},
                    body: data
                });
                
                if(!upResp.ok) throw new Error("Upload failed");

                log(":: SYSTEM :: Job Complete. Syncing...");
                document.getElementById('progress').style.width = "100%";
                
                await fetch(`${API_BASE}/complete_job`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'X-Auth-Token': 'FractumSecure2025'},
                    body: JSON.stringify({
                        id: job.id,
                        username: DISPLAY_NAME,
                        metadata: { codec_name: 'av1', height: 480, duration: 300 },
                        local_path: "web_encode",
                        remote_name: job.filename
                    })
                });
                
                try {
                    await ffmpeg.deleteFile(inputName);
                    await ffmpeg.deleteFile(outputName);
                } catch(e) {}

            } catch (e) {
                if (window.fractumState.running) {
                    log("[!] JOB FAILED: " + (e.message || e));
                    await fetch(`${API_BASE}/fail_job`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json', 'X-Auth-Token': 'FractumSecure2025'},
                        body: JSON.stringify({ id: job.id })
                    });
                }
            }
        }
    </script>
</body>
</html>
