<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRACTUM :: ADMIN CONSOLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --neon-red: #ff0055;
            --neon-green: #00ff41;
            --text-light: #e0e0e0;
            --text-dim: #888888;
            --font: 'Roboto Mono', monospace;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font);
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--text-dim);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .title { color: var(--neon-red); font-size: 1.5em; font-weight: bold; }
        
        /* Login Overlay */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column;
        }
        input {
            background: #111; border: 1px solid var(--neon-red);
            color: var(--text-light); padding: 10px; font-family: var(--font);
            font-size: 1.2em; width: 300px; text-align: center; margin-bottom: 20px;
        }
        button {
            background: var(--neon-red); color: black; border: none;
            padding: 10px 30px; font-family: var(--font); font-weight: bold;
            cursor: pointer; font-size: 1.2em;
        }
        button:hover { background: white; }

        /* Console Window */
        #console-window {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #333;
            padding: 15px;
            overflow-y: scroll;
            font-size: 0.9em;
            white-space: pre-wrap;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .log-line { margin-bottom: 2px; border-bottom: 1px solid #111; }
        .log-err { color: var(--neon-red); font-weight: bold; background: rgba(255,0,85,0.1); }
        .log-warn { color: orange; }
        .log-info { color: var(--text-dim); }
        .log-success { color: var(--neon-green); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2 class="title">>> AUTHENTICATION REQUIRED</h2>
        <input type="password" id="tokenInput" placeholder="ENTER ADMIN TOKEN">
        <button onclick="authenticate()">CONNECT</button>
    </div>

    <div class="header">
        <div class="title">// MANAGER_CONSOLE</div>
        <div>
            STATUS: <span id="status" style="color:var(--neon-red)">DISCONNECTED</span>
            <button onclick="clearLogs()" style="font-size:0.8em; padding:5px 10px; margin-left:10px;">CLEAR</button>
        </div>
    </div>

    <div id="console-window"></div>

    <script>
        let AUTH_TOKEN = "";
        let isAutoScrolling = true;
        const consoleWin = document.getElementById('console-window');

        function authenticate() {
            const token = document.getElementById('tokenInput').value;
            if (!token) return alert("Token required");
            AUTH_TOKEN = token;
            
            // Test connection
            fetchLogs();
        }

        // Detect if user scrolled up (to stop auto-scroll)
        consoleWin.addEventListener('scroll', () => {
            if (consoleWin.scrollTop + consoleWin.clientHeight >= consoleWin.scrollHeight - 50) {
                isAutoScrolling = true;
            } else {
                isAutoScrolling = false;
            }
        });

        async function fetchLogs() {
            try {
                const res = await fetch('/admin/logs', {
                    headers: { 'X-Admin-Token': AUTH_TOKEN }
                });

                if (res.status === 403) {
                    alert("Invalid Token");
                    AUTH_TOKEN = "";
                    return;
                }

                // If success, hide login
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('status').innerText = "LIVE";
                document.getElementById('status').style.color = "var(--neon-green)";

                const data = await res.json();
                renderLogs(data.logs);

                // Poll again in 2 seconds
                setTimeout(fetchLogs, 2000);

            } catch (e) {
                console.error(e);
                document.getElementById('status').innerText = "ERROR";
                setTimeout(fetchLogs, 5000);
            }
        }

        function renderLogs(logs) {
            const html = logs.map(line => {
                let cls = "log-info";
                if (line.includes("ERROR") || line.includes("FAIL") || line.includes("[!]")) cls = "log-err";
                else if (line.includes("WARN") || line.includes("DEBUG")) cls = "log-warn";
                else if (line.includes("SUCCESS") || line.includes("COMPLETED")) cls = "log-success";
                return `<div class="log-line ${cls}">${line}</div>`;
            }).join('');

            consoleWin.innerHTML = html;

            if (isAutoScrolling) {
                consoleWin.scrollTop = consoleWin.scrollHeight;
            }
        }

        function clearLogs() {
            consoleWin.innerHTML = "";
        }
        
        // Allow Enter key on login
        document.getElementById("tokenInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") authenticate();
        });
    </script>
</body>
</html>
